<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gráfico de Barras Dinámico</title>

<style>
#contenedor {
    display: flex;
    align-items: flex-end;
    height: 300px;
    width: 400px;
    border: 1px solid black;
    gap: 10px;
    padding: 10px;
}

.barra {
    width: 50px;
    background: steelblue;
    transition: height 0.5s;
}
</style>
</head>

<body>

<h2>Gráfico de Barras Dinámico</h2>
<div id="contenedor"></div>

<script>
const contenedor = document.getElementById("contenedor");

// Crear barras
let barras = [];
for (let i = 0; i < 5; i++) {
    let div = document.createElement("div");
    div.classList.add("barra");
    contenedor.appendChild(div);
    barras.push(div);
}

// Función para actualizar valores
function actualizar() {
    barras.forEach(barra => {
        let valor = Math.floor(Math.random() * 90) + 10;
        barra.style.height = valor * 2 + "px";
    });
}

// Actualizar cada segundo
setInterval(actualizar, 1000);
actualizar();
</script>

</body>
</html>
